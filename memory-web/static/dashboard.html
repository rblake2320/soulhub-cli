<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MemoryWeb Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', monospace; padding: 24px; min-height: 100vh; }
  h1 { color: #38bdf8; font-size: 28px; margin-bottom: 4px; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 24px; }
  .section-title { color: #94a3b8; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: bold; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; margin-bottom: 24px; }
  .card { background: #1e293b; border-radius: 8px; padding: 14px; border: 1px solid #334155; }
  .card .val { font-size: 26px; font-weight: bold; color: #38bdf8; }
  .card .lbl { font-size: 10px; color: #64748b; margin-top: 4px; text-transform: uppercase; }
  .svc { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .svc span { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .ok { background: #064e3b; color: #34d399; }
  .fail { background: #451a03; color: #fbbf24; }
  .search-box { display: flex; gap: 8px; margin-bottom: 16px; }
  input { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 10px 14px; border-radius: 6px; flex: 1; font-size: 14px; outline: none; }
  input:focus { border-color: #38bdf8; }
  button { background: #0284c7; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
  button:hover { background: #0369a1; }
  .results-panel { background: #1e293b; border-radius: 8px; border: 1px solid #334155; overflow: hidden; }
  .results-header { padding: 12px 16px; border-bottom: 1px solid #334155; background: #0f172a; font-size: 12px; color: #94a3b8; display: flex; gap: 16px; align-items: center; }
  .timing { color: #fbbf24; font-weight: 600; }
  .tier-badge { background: #1d4ed8; color: #bfdbfe; border-radius: 4px; padding: 2px 8px; font-size: 11px; }
  .result { padding: 16px; border-bottom: 1px solid #1e293b; }
  .result:last-child { border: none; }
  .fact { color: #f1f5f9; font-size: 14px; line-height: 1.5; margin-bottom: 8px; }
  .tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
  .tag { background: #1e3a5f; color: #93c5fd; border-radius: 4px; padding: 2px 7px; font-size: 10px; }
  .tag.domain { background: #312e81; color: #c4b5fd; }
  .tag.intent { background: #0c4a6e; color: #7dd3fc; }
  .tag.sensitivity { background: #3f3f00; color: #fde68a; }
  .tag.importance { background: #064e3b; color: #6ee7b7; }
  .prov { color: #a78bfa; font-size: 11px; margin-top: 4px; }
  .prov a { color: #818cf8; text-decoration: none; }
  .score { float: right; color: #64748b; font-size: 11px; }
  #loading { color: #38bdf8; padding: 24px; text-align: center; font-size: 16px; }
  .empty { color: #475569; padding: 32px; text-align: center; }
  .tombstone-panel { margin-top: 24px; }
  .tombstone-input { display: flex; gap: 8px; }
  select { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 10px 14px; border-radius: 6px; font-size: 14px; }
  .btn-danger { background: #dc2626; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-success { background: #059669; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; border: 1px solid #334155; padding: 12px 20px; border-radius: 8px; color: #34d399; font-size: 13px; opacity: 0; transition: opacity 0.3s; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<h1>🧠 MemoryWeb</h1>
<div class="sub">Provenance-Aware Tiered Memory System &nbsp;·&nbsp; <span id="api-url">http://127.0.0.1:8100</span></div>

<div class="section-title">Services</div>
<div id="services" class="svc"><span style="color:#475569">Loading…</span></div>

<div class="section-title">Database</div>
<div id="stats" class="grid"><div class="card"><div class="val" style="color:#475569">…</div><div class="lbl">loading</div></div></div>

<div class="section-title">Pipeline Health</div>
<div id="pipeline-health" class="svc"><span style="color:#475569">Loading…</span></div>

<div class="section-title">Memory Search</div>
<div class="search-box">
  <input id="query" value="pgvector installation" placeholder="Search your memories…" onkeydown="if(event.key==='Enter') doSearch()" />
  <button onclick="doSearch()">Search</button>
</div>
<div id="results-panel" class="results-panel">
  <div id="loading">Loading…</div>
</div>

<div class="toast" id="toast"></div>

<script>
const BASE = 'http://127.0.0.1:8100';

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function loadStatus() {
  const r = await fetch(BASE + '/api/status');
  const d = await r.json();

  // Services
  document.getElementById('services').innerHTML = d.services.map(s =>
    '<span class="' + (s.healthy ? 'ok' : 'fail') + '">' +
    (s.healthy ? '✅' : '⚠️') + ' ' + s.name +
    (s.detail ? ' (' + s.detail + ')' : '') +
    '</span>'
  ).join('');

  // Stats
  const st = d.stats;
  const cards = [
    [st.memories, 'Memories'],
    [st.segments, 'Segments'],
    [(st.messages || 0).toLocaleString(), 'Messages'],
    [st.embeddings, 'Embeddings'],
    [st.conversations, 'Conversations'],
    [st.sources, 'Sources'],
    [st.tombstoned_memories, 'Tombstoned'],
    ['<10ms', 'Tier1 Latency'],
  ];
  document.getElementById('stats').innerHTML = cards.map(([v, l]) =>
    '<div class="card"><div class="val">' + v + '</div><div class="lbl">' + l + '</div></div>'
  ).join('');

  // Pipeline health
  const ph = d.pipeline_health;
  if (ph) {
    const pct = ph.total > 0 ? Math.round(ph.done / ph.total * 100) : 0;
    document.getElementById('pipeline-health').innerHTML =
      '<span class="ok">✅ Done: ' + ph.done + '</span>' +
      (ph.running > 0 ? '<span style="background:#1e3a5f;color:#7dd3fc;padding:5px 14px;border-radius:20px;font-size:12px">⚙️ Running: ' + ph.running + '</span>' : '') +
      (ph.pending > 0 ? '<span style="background:#1e293b;color:#94a3b8;padding:5px 14px;border-radius:20px;font-size:12px">⏳ Pending: ' + ph.pending + '</span>' : '') +
      (ph.failed > 0 ? '<span class="fail">⚠️ Failed: ' + ph.failed + '</span>' : '') +
      '<span style="background:#1e293b;color:#64748b;padding:5px 14px;border-radius:20px;font-size:12px">' + pct + '% complete</span>';
  } else {
    document.getElementById('pipeline-health').innerHTML = '<span style="color:#475569">N/A</span>';
  }
}

async function doSearch() {
  const q = document.getElementById('query').value.trim();
  if (!q) return;
  // Recreate loading state each search so we don't depend on a prior DOM node.
  document.getElementById('results-panel').innerHTML = '<div id="loading">Searching…</div>';

  const r = await fetch(BASE + '/api/search', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query: q, k: 8 })
  });
  const d = await r.json();

  let html = '<div class="results-header">';
  html += '<strong style="color:#f1f5f9">' + d.total + ' results</strong>';
  html += '<span class="timing">' + d.latency_ms + 'ms</span>';
  html += d.tiers_used.map(t => '<span class="tier-badge">Tier ' + t + '</span>').join('');
  html += '</div>';

  if (!d.results || d.results.length === 0) {
    html += '<div class="empty">No results found.</div>';
  } else {
    d.results.forEach(function(res) {
      html += '<div class="result">';
      html += '<span class="score">score: ' + (res.score || 0).toFixed(2) + '</span>';
      html += '<div class="fact">' + (res.content || '') + '</div>';

      if (res.tags && res.tags.length) {
        html += '<div class="tags">';
        res.tags.forEach(function(t) {
          html += '<span class="tag ' + t.axis + '">' + t.axis + ': ' + t.value + '</span>';
        });
        html += '</div>';
      }

      if (res.provenance && res.provenance.length) {
        const p = res.provenance[0];
        const fname = (p.source_path || '').split('\\').pop() || 'unknown';
        html += '<div class="prov">📎 ' + fname;
        if (p.char_offset_start != null) {
          html += ' &nbsp;·&nbsp; offset ' + p.char_offset_start.toLocaleString();
        }
        if (p.segment_id) {
          html += ' &nbsp;·&nbsp; segment #' + p.segment_id;
        }
        html += '</div>';
      }

      html += '</div>';
    });
  }

  document.getElementById('results-panel').innerHTML = html;
}

// Load on start
loadStatus().then(doSearch).catch(console.error);

// Auto-refresh stats every 30s
setInterval(loadStatus, 30000);
</script>
</body>
</html>
